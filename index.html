<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>text-dither</title>
    <style>
      /* Inline so the relative URL survives base './' on GitHub Pages;
         Vite does not rebase absolute public paths inside bundled CSS. */
      @font-face {
        font-family: 'InterVariable';
        src: url('fonts/InterVariable.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="controls"></aside>
      <main id="stage-wrap"><canvas id="stage"></canvas></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
